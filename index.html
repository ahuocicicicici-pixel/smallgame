<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>运营修罗场 · KOL Survivor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;700;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    background: #0e0e12;
    color: #dcd6c8;
    font-family: "Noto Serif SC", "Songti SC", "SimSun", serif;
    font-size: 17px;
    line-height: 1.85;
    min-height: 100vh;
  }
  body::before {
    content: "";
    position: fixed;
    inset: 0;
    pointer-events: none;
    background: repeating-linear-gradient(
      0deg,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 2px,
      rgba(255,255,255,0.015) 2px,
      rgba(255,255,255,0.015) 3px
    );
    z-index: 999;
  }
  #game {
    max-width: 720px;
    margin: 0 auto;
    padding: 48px 32px 120px;
    min-height: 100vh;
  }
  code { font-family: "JetBrains Mono", monospace; color: #b0d8b5; background: rgba(255,255,255,0.05); padding: 1px 6px; border-radius: 3px; font-size: 15px;}
  strong { color: #fff4dc; font-weight: 700; }
  em {
    color: #8a7f5f;
    font-style: italic;
    opacity: 0.95;
  }
  /* 他人对话:中文双引号自动识别 */
  .dialogue {
    color: #ffe8a8;
    font-weight: 500;
  }
  /* 剧情关键字 [[...]] */
  .keyword {
    color: #e8b87c;
    font-weight: 700;
    background: rgba(232, 184, 124, 0.08);
    border-bottom: 1px dashed rgba(232, 184, 124, 0.7);
    padding: 1px 4px;
    border-radius: 2px;
  }
  /* 人名显示 · 内部同事 暖琥珀 · KOL/外部 青色 */
  .npc-internal {
    color: #f5dfa5;
    font-weight: 600;
    background: rgba(245, 223, 165, 0.06);
    padding: 0 3px;
    border-radius: 2px;
  }
  .npc-kol {
    color: #8ed1c4;
    font-weight: 600;
    border-bottom: 1px dashed rgba(142, 209, 196, 0.55);
    padding: 0 2px;
  }
  /* 嵌套:trigger 内的人名不应覆盖 trigger 的暗藏提示色 */
  .hot-trigger .npc-internal,
  .hot-trigger .npc-kol {
    color: inherit;
    background: transparent;
    border-bottom: none;
    font-weight: inherit;
    padding: 0;
  }
  /* NPC 名字 cursor 提示可交互 */
  .npc-internal[data-npc],
  .npc-kol[data-npc] {
    cursor: help;
  }
  /* NPC 人物卡 popup */
  .npc-popup-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    z-index: 998;
    display: none;
  }
  .npc-popup-backdrop.show {
    display: block;
  }
  .npc-popup-card {
    position: fixed;
    display: none;
    pointer-events: none;
    background: #1a1a1f;
    border: 1px solid rgba(232, 184, 124, 0.45);
    border-left: 3px solid #e8b87c;
    padding: 16px 18px;
    border-radius: 4px;
    max-width: 440px;
    z-index: 999;
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.6);
    color: #e8e8e8;
  }
  .npc-popup-card.show {
    display: block;
  }
  .npc-popup-card .npc-popup-tag {
    font-size: 11px;
    color: #e8b87c;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    margin-bottom: 6px;
    font-weight: 600;
  }
  .npc-popup-card .npc-popup-name {
    font-size: 18px;
    font-weight: 700;
    color: #f5dfa5;
    margin-bottom: 4px;
    letter-spacing: 0.5px;
  }
  .npc-popup-card .npc-popup-role {
    font-size: 12px;
    color: #999;
    margin-bottom: 10px;
    font-style: italic;
  }
  .npc-popup-card .npc-popup-vibe {
    font-size: 13px;
    line-height: 1.6;
    color: #d8d8d8;
  }
  /* 移动 / 触屏:走 modal 居中风格 */
  @media (pointer: coarse), (max-width: 640px) {
    .npc-popup-card {
      pointer-events: auto;
    }
    .npc-popup-card.show {
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%);
      max-width: 85vw;
      width: 85vw;
    }
  }

  /* 隐藏触发词 {{flag|text}} · 和 keyword 视觉相近 · 但 hover 露出 Mirror 紫 */
  .hot-trigger {
    color: #d8c89a;
    border-bottom: 1px dotted rgba(200, 180, 140, 0.4);
    cursor: help;
    padding: 1px 2px;
    transition: color 0.25s, background 0.25s, border-color 0.25s;
  }
  .hot-trigger:hover {
    color: #d8b8ff;
    border-bottom-color: #d8b8ff;
    background: rgba(216, 184, 255, 0.1);
  }
  .hot-trigger.fired {
    color: #6a6350;
    border-bottom: none;
    cursor: default;
    background: none;
  }
  /* 新解锁的隐藏选项闪现 */
  @keyframes choice-unlock {
    0%   { box-shadow: 0 0 0 0 rgba(216, 184, 255, 0.75); border-color: #d8b8ff; transform: translateY(-3px); }
    50%  { box-shadow: 0 0 0 10px rgba(216, 184, 255, 0);  border-color: #d8b8ff; }
    100% { box-shadow: 0 0 0 0 rgba(216, 184, 255, 0); transform: translateY(0); }
  }
  .choice.just-unlocked {
    animation: choice-unlock 0.9s ease-out;
  }
  /* 引用块:邮件 / 数据表 / Mirror 记录 */
  blockquote.quote-block {
    margin: 20px 0;
    padding: 14px 18px;
    background: rgba(255, 255, 255, 0.025);
    border-left: 3px solid #5a5448;
    color: #bfb59c;
    font-style: italic;
    font-size: 15px;
    line-height: 1.8;
  }
  blockquote.quote-block strong { color: #e8dfc8; font-style: normal; }
  blockquote.quote-block code { font-style: normal; }

  /* ========== 公文包(道具) ========== */
  .briefcase {
    position: fixed;
    top: 16px;
    right: 16px;
    z-index: 100;
    font-family: "JetBrains Mono", monospace;
    user-select: none;
  }
  .briefcase-btn {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: rgba(22, 22, 28, 0.92);
    border: 1px solid #3a3528;
    color: #c6a878;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all 0.2s;
    position: relative;
  }
  .briefcase-btn:hover { border-color: #c6a878; }
  .briefcase-btn .count {
    position: absolute;
    top: -4px;
    right: -4px;
    background: #c6a878;
    color: #0e0e12;
    font-size: 10px;
    font-weight: 700;
    min-width: 18px;
    height: 18px;
    border-radius: 9px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }
  .briefcase-btn.empty .count { display: none; }
  .briefcase-btn.pulse {
    animation: briefcase-pulse 1.2s ease-out;
  }
  @keyframes briefcase-pulse {
    0%   { box-shadow: 0 0 0 0 rgba(232,184,124,0.6); }
    60%  { box-shadow: 0 0 0 14px rgba(232,184,124,0); }
    100% { box-shadow: 0 0 0 0 rgba(232,184,124,0); }
  }
  .briefcase-panel {
    position: absolute;
    top: 52px;
    right: 0;
    width: 280px;
    max-width: calc(100vw - 32px);
    background: #16161c;
    border: 1px solid #3a3528;
    border-radius: 4px;
    padding: 14px 16px;
    display: none;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  }
  .briefcase.open .briefcase-panel { display: block; }
  .briefcase-panel h4 {
    font-size: 10px;
    letter-spacing: 2px;
    color: #7d7460;
    margin: 0 0 10px;
    text-transform: uppercase;
  }
  .briefcase-panel .empty-hint {
    color: #5a5448;
    font-style: italic;
    font-size: 12px;
  }
  .briefcase-panel ul { list-style: none; padding: 0; margin: 0; }
  .briefcase-panel li {
    color: #c6a878;
    font-size: 12px;
    padding: 6px 0;
    border-bottom: 1px dashed #2a2820;
    line-height: 1.5;
  }
  .briefcase-panel li:last-child { border-bottom: none; }
  .briefcase-panel li .item-note {
    display: block;
    color: #7d7460;
    font-size: 10px;
    font-style: italic;
    margin-top: 2px;
  }
  .briefcase-toast {
    position: absolute;
    top: 52px;
    right: 0;
    background: rgba(232,184,124,0.12);
    border: 1px solid #c6a878;
    color: #ffe8a8;
    font-size: 12px;
    padding: 6px 10px;
    border-radius: 3px;
    pointer-events: none;
    opacity: 0;
    transform: translateY(-6px);
    transition: all 0.3s;
    white-space: nowrap;
  }
  .briefcase-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
  @media (max-width: 640px) {
    .briefcase { top: 10px; right: 10px; }
    .briefcase-btn { width: 38px; height: 38px; font-size: 16px; }
    .briefcase-panel { width: 240px; }
  }

  /* ========== Meta 动态 OS(险 ≥ 8 触发) ========== */
  .meta-whisper {
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
    color: rgba(180, 150, 200, 0.55);
    letter-spacing: 1.5px;
    margin: 22px 0 6px;
    padding-left: 10px;
    border-left: 2px solid rgba(180, 150, 200, 0.25);
    opacity: 0;
    animation: whisper-fade 2.4s ease-out forwards;
    animation-delay: 0.8s;
  }
  @keyframes whisper-fade {
    0%   { opacity: 0; }
    30%  { opacity: 0.85; }
    70%  { opacity: 0.85; }
    100% { opacity: 0.25; }
  }

  /* ========== 顶部时间线 HUD ========== */
  .timeline {
    position: sticky;
    top: 0;
    z-index: 50;
    background: linear-gradient(to bottom, #0e0e12 70%, rgba(14,14,18,0.6));
    padding: 18px 0 14px;
    margin: -48px -32px 28px;
    padding-left: 32px;
    padding-right: 32px;
    border-bottom: 1px solid #22221c;
    backdrop-filter: blur(4px);
  }
  .timeline-goal {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: #7d7460;
    margin-bottom: 10px;
    text-transform: uppercase;
    transition: color 0.3s, background 0.3s;
    padding: 4px 8px;
    border-radius: 3px;
  }
  .timeline-goal.updated {
    color: #c84a3e;
    background: rgba(200, 74, 62, 0.08);
    animation: task-flash 1.6s ease-out;
  }
  @keyframes task-flash {
    0%   { background: rgba(200, 74, 62, 0.0);  transform: scale(1); }
    20%  { background: rgba(200, 74, 62, 0.25); transform: scale(1.02); }
    100% { background: rgba(200, 74, 62, 0.08); transform: scale(1); }
  }
  .timeline-goal .task-label {
    color: #c84a3e;
    font-weight: bold;
    margin-right: 8px;
  }
  .timeline-goal .task-text {
    color: #4a3f2a;
    text-transform: none;
    letter-spacing: 0.5px;
  }
  /* v3.2 · prelude 浮窗 toast */
  .prelude-toast {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.95);
    z-index: 1000;
    background: rgba(28, 24, 16, 0.96);
    color: #f5ede0;
    padding: 28px 32px 20px;
    border-radius: 6px;
    border: 1px solid rgba(200, 74, 62, 0.25);
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.55);
    max-width: 520px;
    width: 88%;
    max-height: 70vh;
    overflow-y: auto;
    cursor: pointer;
    opacity: 0;
    transition: opacity 0.4s ease, transform 0.4s ease;
  }
  .prelude-toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .prelude-toast-head {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #c84a3e;
    text-align: center;
    margin-bottom: 14px;
    text-transform: uppercase;
  }
  .prelude-toast-body {
    font-size: 14px;
    line-height: 1.7;
    color: #e8dec9;
  }
  .prelude-toast-body em { color: #b8a888; font-style: italic; }
  .prelude-toast-body strong { color: #f5ede0; }
  .prelude-toast-body blockquote {
    border-left: 2px solid rgba(200, 74, 62, 0.4);
    padding: 4px 12px;
    margin: 8px 0;
    color: #d4c8a8;
    font-size: 13px;
  }
  .prelude-toast-hint {
    margin-top: 16px;
    padding-top: 12px;
    border-top: 1px solid rgba(245, 237, 224, 0.15);
    text-align: center;
    font-size: 11px;
    color: #7d7460;
    letter-spacing: 1px;
  }
  /* v3 · 代价即时显形浮窗 · 选完后弹出 · 演出 cost · 手动按钮确认 · 不倒计时 */
  .consequence-beat {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.96);
    z-index: 1000;
    background: rgba(20, 14, 14, 0.97);
    color: #f5ede0;
    padding: 30px 34px 22px;
    border-radius: 6px;
    border: 1px solid rgba(200, 74, 62, 0.55);
    border-left: 3px solid #c84a3e;
    box-shadow: 0 12px 40px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(200, 74, 62, 0.12);
    max-width: 480px;
    width: 86%;
    cursor: default;
    opacity: 0;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .consequence-beat.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
  }
  .consequence-beat-head {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 4px;
    color: #c84a3e;
    text-align: center;
    margin-bottom: 18px;
    text-transform: uppercase;
  }
  .consequence-beat-body {
    font-size: 16px;
    line-height: 1.85;
    color: #f3ead2;
    text-align: center;
  }
  .consequence-beat-body p {
    margin: 0 0 6px;
  }
  .consequence-beat-body p:last-child { margin-bottom: 0; }
  .consequence-beat-body em { color: #b8a888; font-style: italic; }
  .consequence-beat-body strong { color: #fff4dc; }
  .consequence-beat-btn {
    display: block;
    margin: 22px auto 0;
    padding: 10px 40px;
    background: rgba(200, 74, 62, 0.15);
    border: 1px solid #c84a3e;
    color: #f5ede0;
    font-family: inherit;
    font-size: 13px;
    letter-spacing: 6px;
    cursor: pointer;
    border-radius: 3px;
    transition: all 0.2s;
  }
  .consequence-beat-btn:hover {
    background: rgba(200, 74, 62, 0.32);
    color: #fff4dc;
  }
  .consequence-beat-btn:active {
    transform: scale(0.98);
  }
  @media (max-width: 700px) {
    .consequence-beat { padding: 22px 20px 18px; }
    .consequence-beat-body { font-size: 15px; }
    .consequence-beat-btn { padding: 9px 32px; letter-spacing: 4px; }
  }

  /* prelude 折叠备份(body 顶部 details) */
  .prelude-folded {
    margin: 0 0 14px;
    padding: 6px 10px;
    background: rgba(125, 116, 96, 0.08);
    border-left: 2px solid rgba(125, 116, 96, 0.4);
    border-radius: 3px;
    font-size: 13px;
  }
  .prelude-folded summary {
    cursor: pointer;
    color: #7d7460;
    font-family: "JetBrains Mono", monospace;
    font-size: 11px;
    letter-spacing: 1px;
    list-style: none;
    user-select: none;
  }
  .prelude-folded summary:hover { color: #4a3f2a; }
  .prelude-folded[open] summary { margin-bottom: 8px; }
  .prelude-folded-body {
    color: #6a5f48;
    line-height: 1.6;
  }
  .prelude-folded-body em { color: #8a7c5e; font-style: italic; }
  @media (max-width: 700px) {
    .prelude-toast { padding: 20px 18px 14px; font-size: 13px; }
    .prelude-toast-body { font-size: 13px; }
  }
  .timeline-goal .goal-focus {
    color: #c6a878;
  }
  .timeline-days {
    display: flex;
    gap: 6px;
    align-items: center;
    font-family: "JetBrains Mono", monospace;
    font-size: 12px;
  }
  .timeline-days .day {
    color: #3a3528;
    padding: 2px 8px;
    border: 1px solid #2a2820;
    border-radius: 2px;
    letter-spacing: 1px;
  }
  .timeline-days .day.past {
    color: #5a5448;
    border-color: #3a3528;
  }
  .timeline-days .day.active {
    color: #0e0e12;
    background: #c6a878;
    border-color: #c6a878;
    font-weight: 700;
  }
  .timeline-days .sep {
    color: #3a3528;
    font-size: 10px;
  }
  @media (max-width: 640px) {
    .timeline {
      padding: 12px 0 10px;
      margin: -28px -18px 18px;
      padding-left: 18px;
      padding-right: 18px;
    }
    .timeline-goal { font-size: 10px; margin-bottom: 8px; letter-spacing: 1px; }
    .timeline-days { font-size: 11px; gap: 4px; }
    .timeline-days .day { padding: 2px 6px; }
  }
  .chapter-tag {
    font-size: 12px;
    letter-spacing: 4px;
    color: #7d7460;
    margin-bottom: 8px;
    text-transform: uppercase;
  }
  .node-title {
    font-size: 40px;
    font-weight: 800;
    color: #fff4dc;
    margin-bottom: 14px;
    letter-spacing: 2px;
    padding: 14px 22px;
    background: linear-gradient(90deg, rgba(232,184,124,0.18) 0%, rgba(232,184,124,0.04) 60%, transparent 100%);
    border-left: 6px solid #e8b87c;
    line-height: 1.15;
    text-shadow: 0 2px 12px rgba(0, 0, 0, 0.45);
  }
  .node-summary {
    font-size: 14px;
    color: #c0b48f;
    font-style: italic;
    margin: 0 0 30px 18px;
    letter-spacing: 0.4px;
    line-height: 1.55;
    padding: 8px 14px;
    background: rgba(232, 184, 124, 0.05);
    border-left: 2px solid rgba(232, 184, 124, 0.4);
  }
  .node-body p {
    margin-bottom: 18px;
    color: #dcd6c8;
  }
  .choices {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }
  .choice {
    padding: 16px 20px;
    border: 1px solid #33332d;
    background: #16161c;
    color: #d8d2c4;
    cursor: pointer;
    text-align: left;
    font-family: inherit;
    font-size: 16px;
    line-height: 1.6;
    transition: all 0.2s ease;
    position: relative;
  }
  .choice:hover {
    border-color: #7d7460;
    background: #1d1d24;
    color: #f3ead2;
    transform: translateX(4px);
  }
  .choice .choice-key {
    color: #7d7460;
    font-family: "JetBrains Mono", monospace;
    font-size: 14px;
    margin-right: 10px;
  }
  .choice:hover .choice-key { color: #c6b78f; }
  .choice.disabled {
    opacity: 0.35;
    cursor: not-allowed;
    pointer-events: none;
  }
  .choice.disabled::after {
    content: " · M2 开放";
    color: #555;
    font-size: 12px;
    margin-left: 6px;
  }
  /* v3 · 选项代价行 · 显形给玩家"选这个会失去什么" · 不确定句式 · 支持 \n 换行 */
  .choice .choice-cost {
    display: block;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px dashed rgba(125, 116, 96, 0.35);
    font-size: 13px;
    line-height: 1.7;
    color: #9a8e72;
    font-style: normal;
    white-space: pre-wrap;
  }
  .choice .choice-cost::before {
    content: "代价 · ";
    color: #c84a3e;
    font-weight: 600;
    letter-spacing: 0.5px;
  }
  .choice:hover .choice-cost { color: #c0b48f; }
  .choice .choice-cost em { color: #b8a888; }

  /* === START SCREEN === */
  #start-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 48px;
    position: relative;
  }
  /* v3.3 · 角色选择背景图 · 图缺失时 fallback 黑底 */
  .start-screen-bg {
    background-color: #0e0e12;
    background-image: url('assets/login-bg.png');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    background-attachment: fixed;
  }
  .start-screen-bg::before {
    content: "";
    position: absolute;
    inset: 0;

// ============================================================
// ENGINE
// ============================================================
const state = {
  playerName: "",
  playerGender: "",
  currentNode: null,
  stats: { 决: 0, 共: 0, 规: 0, 险: 0 },
  items: new Set(),
  flags: new Set(),
  choices: {},
  visitedNodes: [],
  startedAt: Date.now()
};

window.__state = state; // debug

function resetState(name, gender) {
  state.playerName = name;
  state.playerGender = gender || "";
  state.currentNode = null;
  state.stats = { 决: 0, 共: 0, 规: 0, 险: 0 };
  state.items.clear();
  state.flags.clear();
  state.choices = {};
  state.visitedNodes = [];
  state.startedAt = Date.now();
}

function applyChoice(nodeId, choiceKey) {
  const node = STORY.nodes[nodeId];
  const choice = node.choices.find(c => c.key === choiceKey);
  if (!choice) return null;
  const weight = node.weight ?? 1;
  for (const [dim, base] of Object.entries(choice.effects || {})) {
    state.stats[dim] = (state.stats[dim] || 0) + base * weight;
  }
  state.choices[nodeId] = choiceKey;
  state._justGained = null;
  if (choice.item && !state.items.has(choice.item)) {
    state.items.add(choice.item);
    state._justGained = choice.item;
  }
  if (choice.flag && !state.flags.has(choice.flag)) {
    state.flags.add(choice.flag);
    if (!state._justGained) state._justGained = choice.flag;
  }
  state.visitedNodes.push(nodeId);
  // next 支持函数 · 用于结局动态判定(ENDING_GATE 等)
  return typeof choice.next === "function" ? choice.next(state) : choice.next;
}

// ---- 字母分档(§5.3 · v2 · 拉长分档解决数值溢出)----
// 一周目实测容易破 ±40,因此 !! 档放在 ±25,! 档 ±10,拉出三档区分度
function toLetter(value, posChar, negChar) {
  if (value >= 25) return posChar + "!!";
  if (value >= 10) return posChar + "!";
  if (value >= 3)  return posChar;
  if (value >= -2) return "·";
  if (value >= -9) return negChar;
  if (value >= -24) return negChar + "!";
  return negChar + "!!";
}
function computeLetters(stats) {
  return [
    toLetter(stats.决, "D", "H"),
    toLetter(stats.共, "E", "C"),
    toLetter(stats.规, "R", "B"),
    toLetter(stats.险, "V", "S")
  ];
}
function lettersToKey(letters) {
  // 去掉所有强度标识(! / !!)和中性符号,取出 4 字母大写;中性 · 用正向占位
  const defaults = ["D", "E", "R", "S"];
  return letters.map((L, i) => {
    const bare = L.replace(/!+/g, "");
    if (bare === "·") return defaults[i];
    return bare.toUpperCase();
  }).join("");
}

// KOL 完整名必须在短名之前(regex alternation 左优先)· Emma Nguyen > EmmaPet · 已移除 v2.1 旧名 Julia/Emma
const NPC_KOL_RE = /(RourkeHolly|Emma Nguyen|EmmaPet|KaptainK|TechPeter|Konstantin|JesseFun|TechSarah|PetMolly|NoTechBro|AsiaVina|SportTim)/g;

function renderMarkdownInline(s) {
  // 视觉分层:触发词 {{flag|text}} · 关键字 [[...]] · 粗体 **...** · 斜体(内心 OS) *...* · 代码 `...` · 对话 "..."
  return s
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    // 隐藏触发词:可点击文字 · 点后解锁对应 flag · 解锁后改渲染为 fired 暗色
    // 三参数 {{flag|text|gate}} · gate 存在且玩家无该 flag/item · 退化为普通文本(暗线 gating)
    .replace(/\{\{([a-z0-9_]+)\|([^|}]+)(?:\|([a-z0-9_]+))?\}\}/g, (_, flag, text, gate) => {
      if (gate && !state.flags.has(gate) && !state.items.has(gate)) {
        return text;
      }
      const fired = state.flags.has(flag);
      const cls = fired ? "hot-trigger fired" : "hot-trigger";
      const attr = fired ? "" : ` data-unlock="${flag}"`;
      return `<span class="${cls}"${attr}>${text}</span>`;
    })
    .replace(/\[\[([^\]]+)\]\]/g, '<span class="keyword">$1</span>')
    .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
    .replace(/\*([^*\n]+)\*/g, "<em>$1</em>")
    .replace(/`([^`]+)`/g, "<code>$1</code>")
    .replace(/([\u201C])([^\u201D]+)([\u201D])/g, '<span class="dialogue">$1$2$3</span>')
    // 人名 auto-wrap · 最后一步 · 加 data-npc 属性供 popup 系统读取
    .replace(NPC_INTERNAL_RE, '<span class="npc-internal" data-npc="$1">$1</span>')
    .replace(NPC_KOL_RE, '<span class="npc-kol" data-npc="$1">$1</span>');
}

function replacePlaceholders(s) {
  let out = s.replace(/\{playerName\}/g, state.playerName || "你");
  // {addr} · 陆屿等 NPC 对玩家的称呼 · 男主"哥" / 女主"姐"
  out = out.replace(/\{addr\}/g, state.playerGender === "f" ? "姐" : "哥");
  if (out.includes("{playerType}")) {
    const letters = computeLetters(state.stats);
    out = out.replace(/\{playerType\}/g, letters.join(""));
  }
  return out;
}

function bodyToHtml(rawBody) {
  const processed = replacePlaceholders(rawBody);
  const paragraphs = processed.split(/\n\n+/);
  return paragraphs.map(p => {
    const rawLines = p.split("\n");
    const nonEmpty = rawLines.filter(l => l.trim() !== "");
    // 整段所有非空行都以 > 开头 → 渲染为引用块
    const isQuote = nonEmpty.length > 0 && nonEmpty.every(l => /^>\s?/.test(l));
    if (isQuote) {
      const inner = nonEmpty
        .map(l => l.replace(/^>\s?/, ""))
        .map(renderMarkdownInline)
        .join("<br>");
      return `<blockquote class="quote-block">${inner}</blockquote>`;
    }
    // 普通段落:先对每行做 markdown 转义,再用真正的 <br> 拼接
    const inner = rawLines.map(renderMarkdownInline).join("<br>");
    return "<p>" + inner + "</p>";
  }).join("");
}

  "(你不确定这条选择,是你在选,还是被选出来的。)",

];
function pickMetaWhisper(nodeId) {
  // 用 nodeId 字符和 险值做一个稳定哈希,同一节点同一险值永远取同一句
  const risk = state.stats.险 | 0;
  let h = risk;
  for (let i = 0; i < nodeId.length; i++) h = (h * 31 + nodeId.charCodeAt(i)) >>> 0;
  return META_WHISPERS[h % META_WHISPERS.length];
}

// v3.2:prelude 浮窗 toast · 自动 fade in/out · 点击 dismiss
// 动态时长:每字 60ms · 最少 8 秒 · 最多 30 秒
function showPreludeToast(text) {
  // 清掉前一个 toast(如果还在)
  document.querySelectorAll('.prelude-toast').forEach(el => el.remove());

  const readMs = Math.max(8000, Math.min(30000, text.length * 60));
  const seconds = Math.round(readMs / 1000);

  const toast = document.createElement('div');
  toast.className = 'prelude-toast';
  toast.innerHTML = `
    <div class="prelude-toast-head">— 上文 —</div>
    <div class="prelude-toast-body">${bodyToHtml(text)}</div>
    <div class="prelude-toast-hint">点击关闭(${seconds} 秒后自动消失)</div>
  `;
  document.body.appendChild(toast);

  // fade-in (next frame)
  requestAnimationFrame(() => toast.classList.add('show'));

  // 自动 fade-out
  const autoClose = setTimeout(() => closeToast(toast), readMs);

  // 点击 dismiss
  toast.addEventListener('click', () => {
    clearTimeout(autoClose);
    closeToast(toast);
  });
}
function closeToast(toast) {
  toast.classList.remove('show');
  setTimeout(() => toast.remove(), 400);
}

// v3 · 代价即时显形浮窗 · 选完 choice 后弹出 · 演出 cost · 手动按钮确认 · 不倒计时
function showConsequenceBeat(beatText, onDismiss) {
  document.querySelectorAll('.consequence-beat').forEach(el => el.remove());
  const lines = beatText.split('\n').filter(l => l.trim()).map(l => `<p>${renderMarkdownInline(l.trim())}</p>`).join('');
  const beat = document.createElement('div');
  beat.className = 'consequence-beat';
  beat.innerHTML = `
    <div class="consequence-beat-head">— 这一刻 —</div>
    <div class="consequence-beat-body">${lines}</div>
    <button type="button" class="consequence-beat-btn">继 续</button>
  `;
  document.body.appendChild(beat);
  requestAnimationFrame(() => beat.classList.add('show'));
  let dismissed = false;
  const dismiss = () => {
    if (dismissed) return;
    dismissed = true;
    beat.classList.remove('show');
    setTimeout(() => {
      beat.remove();
      if (onDismiss) onDismiss();
    }, 380);
  };
  beat.querySelector('.consequence-beat-btn').addEventListener('click', dismiss);
}

function renderTimeline(nodeId) {
  const day = currentDay(nodeId);
  const days = ["周一", "周二", "周三", "周四", "周五"];
  const daysHtml = days.map((d, i) => {
    const idx = i + 1;
    let cls = "day";
    if (idx < day) cls += " past";
    else if (idx === day) cls += " active";
    const sep = i < days.length - 1 ? '<span class="sep">›</span>' : "";
    return `<span class="${cls}">${d}</span>${sep}`;
  }).join("");
  // 任务进度 · 节点可选定义 task 字段 (string 或 function(state))
  // task 比上一帧的 task 不同 → 加 .updated class 触发 flash 动画
  const node = STORY.nodes[nodeId];
  let taskHtml = `Aurora Campaign <span class="goal-focus">· 15 人 · DDL 周五 EOD</span>`;
  let taskUpdated = false;
  if (node && node.task) {
    const taskText = typeof node.task === "function" ? node.task(state) : node.task;
    if (taskText) {
      taskHtml = `<span class="task-label">当前任务</span><span class="task-text">${taskText}</span>`;
      if (state._lastTaskText !== taskText) {
        taskUpdated = true;
        state._lastTaskText = taskText;
      }
    }
  }
  const goalCls = taskUpdated ? "timeline-goal updated" : "timeline-goal";
  return `
    <div class="timeline">
      <div class="${goalCls}">${taskHtml}</div>
      <div class="timeline-days">${daysHtml}</div>
    </div>
  `;
}

function renderNode(nodeId, opts) {
  const node = STORY.nodes[nodeId];
  if (!node) {
    console.error("Unknown node:", nodeId);
    return;
  }
  state.currentNode = nodeId;
  const flashKey = opts && opts.flashKey; // 重渲时,标记哪个 choice 要闪现

  // 动态 prelude:根据上一节点的选择显示不同前言
  let preludeText = "";
  if (node.preludes) {
    const lastNodeId = state.visitedNodes[state.visitedNodes.length - 1];
    const lastChoice = lastNodeId ? state.choices[lastNodeId] : null;
    const key = lastNodeId && lastChoice ? `${lastNodeId}_${lastChoice}` : null;
    preludeText = (key && node.preludes[key]) || node.preludes._default || "";
  }
  // flag 驱动的 prelude(N08 等全局心理状态场景)
  if (node.preludesByFlag) {
    for (const [flag, text] of Object.entries(node.preludesByFlag)) {
      if (state.flags.has(flag) || state.items.has(flag)) { preludeText = (preludeText ? preludeText + "\n\n" : "") + text; }
    }
  }
  const bodyText = typeof node.body === "function" ? node.body(state) : node.body;
  // v3.2:prelude 不再直接拼到 body · 改成 toast 浮窗 + body 顶部折叠引用
  const bodyHtml = bodyToHtml(bodyText);
  const preludeFoldedHtml = preludeText
    ? `<details class="prelude-folded"><summary>▸ 上文 · 点击展开</summary><div class="prelude-folded-body">${bodyToHtml(preludeText)}</div></details>`
    : "";
  const visibleChoices = node.choices.filter(c => !c.condition || c.condition(state));
  const choicesHtml = visibleChoices.map((choice, idx) => {
    const isM2 = choice.next === "__M2__";
    let cls = isM2 ? "choice disabled" : "choice";
    if (choice.key === flashKey) cls += " just-unlocked";
    // 显示 key 按可见顺序:A, B, C, D —— 隐藏选项不留字母缺口,避免被 spoil
    const displayKey = String.fromCharCode(65 + idx);
    const costHtml = choice.cost
      ? `<span class="choice-cost">${renderMarkdownInline(choice.cost)}</span>`
      : "";
    return `<button class="${cls}" data-key="${choice.key}">
      <span class="choice-key">${displayKey}</span>${renderMarkdownInline(choice.text)}
      ${costHtml}
    </button>`;
  }).join("");

  // 阈值和新分档 V! (>=10) 对齐 —— 只有"察觉党"能看到
  const whisperHtml = (state.stats.险 >= 10)
    ? `<div class="meta-whisper">${pickMetaWhisper(nodeId)}</div>`
    : "";

  const summaryHtml = node.summary
    ? `<div class="node-summary">${replacePlaceholders(node.summary)}</div>`
    : "";
  $game.innerHTML = `
    ${renderTimeline(nodeId)}
    <div class="chapter-tag">${node.chapter}</div>
    <div class="node-title">${node.title}</div>
    ${summaryHtml}
    ${preludeFoldedHtml}
    <div class="node-body">${bodyHtml}</div>
    ${whisperHtml}
    <div class="choices">${choicesHtml}</div>
  `;

  // v3.2:prelude 浮窗 toast(自动 8 秒消失 / 点击 dismiss)
  if (preludeText) {
    showPreludeToast(preludeText);
  }

  renderBriefcase();

  let locked = false;
  $game.querySelectorAll(".choice:not(.disabled)").forEach(btn => {
    btn.addEventListener("click", () => {
      if (locked) return;
      locked = true;
      $game.querySelectorAll(".choice").forEach(b => {
        b.style.pointerEvents = "none";
        b.style.opacity = b.classList.contains("disabled") ? "0.2" : "0.55";
      });
      const key = btn.dataset.key;
      const choice = node.choices.find(c => c.key === key);
      const next = applyChoice(nodeId, key);
      if (!next) { locked = false; return; }
      const proceed = () => {
        window.scrollTo(0, 0);
        goTo(next);
      };
      // v3 · L1 代价即时显形:choice 有 beat → 先弹浮窗演出代价 · dismiss 后再 goTo
      if (choice && choice.beat) {
        showConsequenceBeat(replacePlaceholders(choice.beat), proceed);
      } else {
        proceed();
      }
    });
  });

  // 隐藏触发词:点击 → 解锁对应 flag → 重渲染当前节点 → 新 choice 闪现
  $game.querySelectorAll(".hot-trigger[data-unlock]").forEach(span => {
    span.addEventListener("click", () => {
      const flag = span.dataset.unlock;
      if (state.flags.has(flag)) return;
      // 记下当前可见 choice key,用来找"新解锁"的那个
      const before = new Set(
        node.choices.filter(c => !c.condition || c.condition(state)).map(c => c.key)
      );
      state.flags.add(flag);
      const after = node.choices.filter(c => !c.condition || c.condition(state));
      const newKey = after.find(c => !before.has(c.key))?.key;
      renderNode(nodeId, { flashKey: newKey });
    });
  });

  if (!flashKey) window.scrollTo(0, 0);
}

function goTo(nextId) {
  if (nextId === "__M2__") {
    renderM2Placeholder();
    return;
  }
  if (STORY.nodes[nextId]) {
    renderNode(nextId);
  } else if (STORY.endings[nextId]) {
    renderEnding(nextId);
  } else {
    console.error("Unknown target:", nextId);
  }
}

function renderM2Placeholder() {
  $game.innerHTML = `
    <div class="ending-screen" style="text-align:center; padding-top: 120px;">
      <div class="ending-label">DEMO 分支提示</div>
      <div class="ending-name" style="font-size:28px;">此路径在 M2 开放</div>
      <div class="ending-body" style="color:#a39978;">
        <p>当前 M1 demo 仅演示<strong>路径① 正常社畜</strong>。</p>
        <p>完整 30+ 节点 · 6 结局 · 真结局隐藏路径 · 二周目系统<br>将在 M2 / M3 解锁。</p>
      </div>
      <button class="restart-btn" id="back-btn">返 回 上 一 步</button>
    </div>
  `;
  document.getElementById("back-btn").addEventListener("click", () => {
    if (state.currentNode) renderNode(state.currentNode);
    else renderStartScreen();
  });
}

function renderEnding(endingId) {
  const ending = STORY.endings[endingId];
  if (!ending) { console.error("Unknown ending:", endingId); return; }
  hideBriefcase();

  const letters = computeLetters(state.stats);
  const personalityKey = lettersToKey(letters);
  const persona = PERSONALITY[personalityKey] || PERSONALITY._DEFAULT;

  // v3 §1.5 觉察 tier 段(陆屿后续):4 个非真结局根据 awareness 加陆屿后续段
  // N09 是真结局 · 不加 tier
  let bodyText = ending.body;
  if (endingId !== "N09") {
    const aw = awarenessCount();
    let tier = "";
    if (aw >= 7) {
      tier = `\n\n——\n\n*周一 09:00 · 你收到一封陌生律师邮件:*\n\n> 「我们代理陆屿先生 · 已就劳动仲裁立案 · N+3 通过。」\n\n*他不知道是你递的证据。*\n*但他这周末 · 终于能睡着了。*`;
    } else if (aw >= 4) {
      tier = `\n\n——\n\n*周一 10:00 · 陆屿微信:*\n\n> 在么 · 我手上一份推荐信你能不能帮我签个字\n\n*你签了 · 没多说。*\n*他去了上海一家小机构。*`;
    } else {
      tier = `\n\n——\n\n*周一 09:00 · 陆屿那条对话框 · 灰色。*\n*头像没换 —— 但「最近在线」这一栏空了。*\n*这周你不会再听到他的消息。*`;
    }
    bodyText = bodyText + tier;
  }

  const endingBodyHtml = bodyToHtml(bodyText);
  const lettersDisplay = letters.join(" ");

  const statsStr = `决 ${formatStat(state.stats.决)} · 共 ${formatStat(state.stats.共)} · 规 ${formatStat(state.stats.规)} · 险 ${formatStat(state.stats.险)}`;

  $game.innerHTML = `
    <div class="ending-screen">
      <div class="ending-label">${ending.label}</div>
      <div class="ending-name">${ending.title}</div>
      <div class="ending-body">${endingBodyHtml}</div>

      <hr class="ending-divider">

      <div class="personality-card">
        <div class="personality-letters">${lettersDisplay}</div>
        <div class="personality-title">${state.playerName} · ${persona.title}</div>

        <div class="personality-row"><span class="label">核心特质</span><span class="value">${renderMarkdownInline(persona.mentalState)}</span></div>
        <div class="personality-row"><span class="label">擅长应对</span><span class="value">${renderMarkdownInline(persona.goodAt)}</span></div>
        <div class="personality-row"><span class="label">容易翻车</span><span class="value">${renderMarkdownInline(persona.badAt)}</span></div>
        <div class="personality-row"><span class="label">最佳搭档</span><span class="value">${renderMarkdownInline(persona.bestPartner)}</span></div>
        <div class="personality-row"><span class="label">天敌</span><span class="value">${renderMarkdownInline(persona.nemesis)}</span></div>
        <div class="personality-row"><span class="label">老板眼中的你</span><span class="value">${renderMarkdownInline(persona.bossView)}</span></div>
      </div>

      ${(() => {
        const all = getCollectedItems();
        // 觉察线索:严格按 AWARENESS_MARKS 过滤
        const clues = all.filter(c => AWARENESS_MARKS.includes(c.id));
        // 反制武器:严格按 WEAPONS_MARKS 过滤
        const weapons = all.filter(c => WEAPONS_MARKS.includes(c.id));
        let html = "";
        if (clues.length === 0) {
          html += `<div class="clue-box empty"><div class="clue-head">【本局线索 · 0/${AWARENESS_MARKS.length}】</div><div class="clue-empty">这一周你什么都没注意到。也许下一周,你会多抬一次头。</div></div>`;
        } else {
          html += `<div class="clue-box"><div class="clue-head">【本局线索 · ${clues.length}/${AWARENESS_MARKS.length}】</div><ul>${clues.map(c => `<li><strong>${c.name}</strong><span class="clue-note">${c.note}</span></li>`).join("")}</ul></div>`;
        }
        if (weapons.length > 0) {
          html += `<div class="clue-box"><div class="clue-head">【反制武器 · ${weapons.length}/${WEAPONS_MARKS.length}】</div><ul>${weapons.map(c => `<li><strong>${c.name}</strong><span class="clue-note">${c.note}</span></li>`).join("")}</ul></div>`;
        }
        return html;
      })()}

      <div class="total-account">
        <strong>【这一局的总账】</strong><br>
        ${ending.totalAccount}
      </div>

      <div class="stats-debug">${statsStr}</div>

      <div class="replay-hint">共 5 个结局 · 16 型人格 · 你这一局是 ${lettersDisplay} · 试试别的路线?</div>

      <button class="restart-btn" id="restart-btn">重 新 开 始</button>
    </div>
  `;
  document.getElementById("restart-btn").addEventListener("click", () => {
    renderStartScreen();
  });
  window.scrollTo(0, 0);
}

function formatStat(n) {
  if (n > 0) return "+" + n;
  return String(n);
}

// ============================================================
// BOOT
// ============================================================
renderStartScreen();

// Debug helpers
window.skipTo = (nodeId) => {
  if (!state.playerName) state.playerName = "阿华";
  renderNode(nodeId);
};
window.jumpEnding = (id) => {
  if (!state.playerName) state.playerName = "阿华";
  renderEnding(id);
};

// ---- NPC 人物卡 popup 系统 · 桌面 hover · 移动 click ----
(function() {
  const card = document.getElementById('npc-popup');
  const backdrop = document.getElementById('npc-popup-backdrop');
  const isTouchDevice = window.matchMedia('(pointer: coarse)').matches;
  let currentTarget = null;

  function fillCard(name) {
    const profile = NPC_PROFILES[name];
    if (!profile) return false;
    card.querySelector('.npc-popup-tag').textContent = profile.tag || '';
    card.querySelector('.npc-popup-name').textContent = name;
    card.querySelector('.npc-popup-role').textContent = profile.role || '';
    card.querySelector('.npc-popup-vibe').textContent = profile.vibe || '';
    const img = card.querySelector('.npc-popup-portrait');
    if (profile.portrait) {
      img.src = profile.portrait;
      img.classList.add('has');
    } else {
      img.removeAttribute('src');
      img.classList.remove('has');
    }
    return true;
  }

  function showCard(target, name) {
    if (!fillCard(name)) return;
    if (isTouchDevice) {
      backdrop.classList.add('show');
      card.classList.add('show');
    } else {
      const rect = target.getBoundingClientRect();
      card.style.left = rect.left + 'px';
      card.style.top = (rect.bottom + 6) + 'px';
      card.classList.add('show');
      // 边界修正:溢出屏幕则反弹
      const cardRect = card.getBoundingClientRect();
      if (cardRect.right > window.innerWidth - 10) {
        card.style.left = (window.innerWidth - cardRect.width - 10) + 'px';
      }
      if (cardRect.bottom > window.innerHeight - 10) {
        card.style.top = (rect.top - cardRect.height - 6) + 'px';
      }
    }
  }

  function hideCard() {
    card.classList.remove('show');
    backdrop.classList.remove('show');
    currentTarget = null;
  }

  // 桌面:hover 进入显示 · 离开隐藏
  document.addEventListener('mouseover', (e) => {
    if (isTouchDevice) return;
    const target = e.target.closest('.npc-internal[data-npc], .npc-kol[data-npc]');
    if (target && target !== currentTarget) {
      currentTarget = target;
      showCard(target, target.dataset.npc);
    }
  });
  document.addEventListener('mouseout', (e) => {
    if (isTouchDevice) return;
    const target = e.target.closest('.npc-internal[data-npc], .npc-kol[data-npc]');
    if (target && target === currentTarget) {
      const related = e.relatedTarget;
      if (!related || !target.contains(related)) {
        hideCard();
      }
    }
  });

  // 移动:点击人名弹卡 · 但选项按钮内的人名不弹(防干扰选项点击)
  document.addEventListener('click', (e) => {
    if (e.target === backdrop) {
      hideCard();
      return;
    }
    if (!isTouchDevice) return;
    const target = e.target.closest('.npc-internal[data-npc], .npc-kol[data-npc]');
    if (target && !target.closest('button') && !target.closest('.choice')) {
      e.preventDefault();
      e.stopPropagation();
      currentTarget = target;
      showCard(target, target.dataset.npc);
    }
  });

  // ESC 关闭
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') hideCard();
  });
})();
</script>
